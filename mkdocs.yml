site_name: Mémo AIS
site_description: Notes de formation AIS
site_author: Olivier
repo_name: memo-ais
docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

extra_css:
  - assets/stylesheets/custom.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Accueil: index.md
  - Intro à l'AIS:
      - Présentation: intro-ais/index.md
      - Matériel: intro-ais/materiel.md
      - Système et Linux: intro-ais/systeme-linux.md
      - Réseau: intro-ais/reseau.md
      - Commandes Linux: intro-ais/commandes-linux.md
      - Cybersécurité:
          - Bases: intro-ais/securite.md
          - Acteurs et rôles: intro-ais/securite-acteurs.md
          - Menaces et attaques: intro-ais/securite-menaces.md
          - Hygiène numérique: intro-ais/hygiene-numerique.md
          - Chiffrement: intro-ais/chiffrement.md
  - Système d’info & archi SI:
      - Présentation: systeme-info-si/index.md
      - Cas concret SI: systeme-info-si/cas-concret-si.md
  - Pense-bête: pense-bete.md
  - Schéma Réseaux & AIS: schema-ais.md
  - Liens utiles: liens-utiles.md
