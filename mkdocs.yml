site_name: Mémo AIS
site_description: Mémo formation AIS
site_author: Olivier
repo_name: memo-ais
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  language: fr
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

extra_css:
  - assets/stylesheets/custom.css

extra_javascript:
  - assets/javascripts/mermaid-zoom.js

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Accueil: index.md
  - Intro à l'AIS:
      - Présentation: intro-ais/index.md
      - Matériel: intro-ais/materiel.md
      - Système et Linux: intro-ais/systeme-linux.md
      - Réseau: intro-ais/reseau.md
      - Commandes Linux: intro-ais/commandes-linux.md
      - Cybersécurité:
          - Bases: intro-ais/securite.md
          - Acteurs et rôles: intro-ais/securite-acteurs.md
          - Menaces et attaques: intro-ais/securite-menaces.md
          - Hygiène numérique: intro-ais/hygiene-numerique.md
          - Chiffrement: intro-ais/chiffrement.md
  - Système d’info & archi SI:
      - Présentation: systeme-info-si/index.md
      - Le système d'information:
          - Vue d'ensemble: systeme-info-si/iteration-1/index.md
          - Cas concret SI: systeme-info-si/iteration-1/cas-concret-si.md
          - Première vue globale du SI: systeme-info-si/iteration-1/premiere-vue-globale-si.md
          - Diagramme réseau du SI: systeme-info-si/iteration-1/diagramme-reseau-si.md
          - Cartographie des utilisateurs: systeme-info-si/iteration-1/cartographie-utilisateurs.md
          - Modèles d'architecture applicative: systeme-info-si/iteration-1/modeles-architecture-applicative.md
          - Dépendances applicatives: systeme-info-si/iteration-1/dependances-applicatives.md
          - Diagrammes finaux & résumé: systeme-info-si/iteration-1/finalisation-diagrammes.md
      - Enjeux clés d'un SI:
          - Vue d'ensemble: systeme-info-si/iteration-2/index.md
          - Enjeux d'un SI à partir du réel: systeme-info-si/iteration-2/enjeux-si-reel.md
          - Identifier et prioriser les risques: systeme-info-si/iteration-2/risques-si.md
          - Introduction aux normes SI: systeme-info-si/iteration-2/normes-si.md
          - Synthèse enjeux, risques et normes: systeme-info-si/iteration-2/synthese-enjeux-risques-normes.md

  - Pense-bête:
      - Vue d'ensemble: pense-bete/index.md
      - Intro AIS: pense-bete/intro-ais.md
      - Linux et commandes: pense-bete/linux.md
      - Réseau: pense-bete/reseau.md
      - Cybersécurité: pense-bete/cybersecurite.md
      - Système d’info & archi SI: pense-bete/systeme-info-si.md
  - Liens utiles: liens-utiles.md
